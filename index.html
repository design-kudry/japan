<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Япония · 17–30 сентября</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F9F7;
  --surface:#FFFFFF;
  --surface-dim:#F3F3F1;
  --border:#E3E3E0;
  --border-strong:#C4C4C0;
  --text-1:#111110;
  --text-2:#5A5A57;
  --text-3:#9A9A97;
  --r:12px;
}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text-1);
  font-size:15px;
  font-weight:400;
  line-height:normal;
  letter-spacing:-0.648px;
}
.jp{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif}

/* ─── HEADER ─── */
.site-header{
  background:rgba(249,249,247,.94);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:16px 20px;
  position:sticky;top:0;z-index:200;
}
.site-header-inner{
  display:flex;justify-content:space-between;align-items:center;
  max-width:640px;margin:0 auto;
}
.site-header h1{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:20px;font-weight:700;
  color:var(--text-1);letter-spacing:-0.648px;line-height:1.2;
}
.header-sub{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11px;color:var(--text-3);
  margin-top:2px;letter-spacing:-0.648px;font-weight:400;
}

/* ─── TABS ─── */
.tabs-wrap{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  position:sticky;top:65px;z-index:190;
  min-height:52px;
  box-sizing:border-box;
  padding:10px 0;
  overflow:visible;
  display:flex;
  align-items:center;
}
.tabs-scroll{
  overflow-x:auto;
  overflow-y:visible;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  min-height:32px;
}
.tabs-scroll::-webkit-scrollbar{display:none}
.tabs{display:inline-flex;flex-wrap:nowrap;align-items:center;padding:0 12px;gap:4px;width:max-content}
.tab{
  display:inline-block;
  flex-shrink:0;
  line-height:1.2;
  padding:7px 12px;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11.5px;font-weight:400;
  color:var(--text-3);
  cursor:pointer;
  border-radius:20px;
  border:1px solid transparent;
  transition:all .15s ease;
  white-space:nowrap;user-select:none;
  letter-spacing:-0.3px;
}
.tab.active{
  color:#fff;font-weight:600;
  background:var(--text-1);
  border-color:var(--text-1);
}
.tab:hover:not(.active){color:var(--text-1);background:var(--surface-dim)}

/* ─── PANEL ─── */
.panel{display:none;max-width:640px;margin:0 auto;padding:24px 16px 64px}
.panel.active{display:block}

/* ─── DAY HEADER ─── */
.day-header{margin-bottom:28px;padding-top:4px}
.day-index{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:400;
  color:var(--text-3);letter-spacing:-0.2px;
  text-transform:lowercase;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.day-index::before{content:'—';color:var(--border-strong)}
.day-title{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:48px;font-weight:700;
  color:var(--text-1);line-height:.95;
  letter-spacing:-1.5px;
}
.day-jp{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:400;color:var(--text-3);
  margin-top:8px;letter-spacing:-0.3px;
}
.day-divider{display:none}

/* ─── NOTE ─── */
.day-note{
  background:var(--surface-dim);
  border-left:2px solid var(--text-1);
  padding:12px 16px;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;
  color:var(--text-2);
  margin-bottom:24px;
  line-height:1.6;
  letter-spacing:-0.4px;
}

/* ─── SECTION LABEL ─── */
.section-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:400;
  color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:12px;margin-top:4px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{display:none}

/* ─── MAP ─── */
.map-wrap{
  border-radius:var(--r);
  overflow:hidden;
  border:1px solid var(--border);
  background:#EAE8E4;
  margin-bottom:28px;
  position:relative;
  z-index:1;
}
.day-map{height:220px}
.map-actions{
  position:absolute;bottom:12px;left:12px;right:12px;
  display:flex;gap:8px;justify-content:center;
  z-index:500;pointer-events:none;
}
.map-btn{
  pointer-events:auto;
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.97);
  border:1px solid var(--border);
  color:var(--text-1);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11px;font-weight:600;
  padding:7px 14px;border-radius:20px;
  text-decoration:none;white-space:nowrap;
  letter-spacing:.02em;
  transition:background .15s,color .15s,border-color .15s;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.map-btn:hover,.map-btn:focus-visible{background:var(--text-1);color:#fff;border-color:var(--text-1);outline:none}
.map-btn--icon{
  position:absolute;top:10px;right:10px;z-index:401;
  width:32px;height:32px;padding:0;border-radius:8px;
  justify-content:center;
}
.map-wrap .leaflet-top.leaflet-right{top:50%;right:10px;transform:translateY(-50%)}
.map-wrap .leaflet-control-zoom{margin-top:0!important}
.map-wrap--fullscreen .map-btn--fs{display:none}
.map-fs-top{
  display:none;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.map-fs-title{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:600;color:var(--text-1);letter-spacing:-.3px;
}
.map-fs-close{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.map-fs-close:hover{background:var(--text-1);color:#fff}
body.map-fs-open{overflow:hidden}
.map-wrap--fullscreen{
  position:fixed;inset:0;z-index:1000;
  margin:0;border-radius:0;border:none;
  display:flex;flex-direction:column;
  background:var(--bg);
}
.map-wrap--fullscreen .map-fs-top{display:flex}
.map-wrap--fullscreen .day-map{flex:1;height:auto!important;min-height:0}
.map-wrap--fullscreen .map-actions{bottom:20px;left:16px;right:16px}

/* ─── TRANSIT ─── */
.transit{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 16px;
  margin-bottom:10px;
  display:flex;gap:14px;align-items:flex-start;
}
.transit-icon-wrap{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--text-2);
}
.transit-body{flex:1;min-width:0}
.transit-route{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:700;
  color:var(--text-1);line-height:1.3;
  letter-spacing:-0.4px;
}
.transit-detail{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;
  color:var(--text-3);margin-top:2px;
  letter-spacing:-0.3px;
}
.transit-cost{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:600;
  color:var(--text-2);margin-top:5px;
  letter-spacing:.01em;
}

/* ─── PLACE CARD ─── */
.place{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:14px;
  overflow:hidden;
}
.place-photo-wrap{position:relative;overflow:hidden}
.place-photo{
  width:100%;height:260px;
  object-fit:cover;display:block;background:var(--surface-dim);
  transition:transform .5s ease;
}
.place:hover .place-photo{transform:scale(1.03)}
.place-photo-err{
  width:100%;height:260px;
  background:var(--surface-dim);
  display:none;align-items:center;justify-content:center;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;color:var(--text-3);
}
.place-num{
  position:absolute;top:14px;left:14px;
  width:28px;height:28px;
  background:rgba(255,255,255,.96);
  border-radius:6px;
  color:var(--text-1);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  letter-spacing:.02em;z-index:2;
}
.place-body{padding:18px 20px 20px;border-top:1px solid var(--border)}
.place-name{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:17px;font-weight:700;
  color:var(--text-1);line-height:1.25;
  letter-spacing:-0.5px;
}
.place-jp{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11px;font-weight:300;
  color:var(--text-3);margin-top:3px;
  letter-spacing:.04em;
}
.place-desc{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;color:var(--text-2);
  margin-top:10px;line-height:1.7;
}
.place-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11px;font-weight:400;
  padding:4px 10px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;
  border:1px solid var(--border);
  color:var(--text-2);
  background:var(--surface-dim);
}
.tag-price{color:var(--text-1);border-color:var(--border-strong)}
.tag-free{color:var(--text-2)}
.tag-hours{color:var(--text-3)}

/* ─── BUDGET ─── */
.budget-block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  margin-top:24px;
}
.budget-block h3{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:300;font-style:italic;
  color:var(--text-3);letter-spacing:.08em;
  margin-bottom:14px;
}
.budget-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.budget-row:last-child{border-bottom:none;padding-top:14px;margin-top:4px}
.budget-row:last-child .budget-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:14px;font-weight:500;color:var(--text-1);
}
.budget-row:last-child .budget-val{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:18px;font-weight:700;color:var(--text-1);
  letter-spacing:-.01em;
}
.budget-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-style:italic;color:var(--text-2);
}
.budget-val{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:600;color:var(--text-1);
}

/* ─── EXPENSES ─── */
.exp-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  margin-bottom:12px;
}
.exp-section h3{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:15px;font-weight:500;color:var(--text-1);
  margin-bottom:14px;
}
.exp-row{
  display:flex;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);
  gap:16px;
}
.exp-row:last-child{border-bottom:none}
.exp-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-style:italic;color:var(--text-2);flex:1;
}
.exp-val{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:600;color:var(--text-1);
  text-align:right;white-space:nowrap;
}
.exp-total{
  background:var(--text-1);
  color:#fff;
  border-radius:var(--r);
  padding:32px 24px;
  margin-top:8px;text-align:center;
}
.exp-total .t-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:300;font-style:italic;
  opacity:.5;margin-bottom:12px;letter-spacing:.06em;
}
.exp-total .t-jpy{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:52px;font-weight:400;
  letter-spacing:-.03em;line-height:1;
}
.exp-total .t-rub{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:14px;opacity:.5;margin-top:8px;font-style:italic;
}

/* ─── LEAFLET ─── */
.leaflet-top.leaflet-right{margin:0!important}
.leaflet-control-zoom{border:none!important;box-shadow:none!important;margin:0!important}
.leaflet-control-zoom a{
  background:rgba(255,255,255,.97)!important;
  border:1px solid var(--border)!important;
  color:var(--text-1)!important;
  width:32px!important;height:32px!important;
  line-height:30px!important;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif!important;
  font-size:18px!important;font-weight:400!important;
  transition:background .15s,color .15s!important;
}
.leaflet-control-zoom a:hover{
  background:var(--text-1)!important;
  color:#fff!important;
}
.leaflet-control-zoom-in{border-radius:8px 8px 0 0!important;margin-bottom:-1px!important}
.leaflet-control-zoom-out{border-radius:0 0 8px 8px!important}
.leaflet-bar a.leaflet-disabled{
  background:var(--surface-dim)!important;
  color:var(--text-3)!important;
  cursor:default!important;
}
.leaflet-popup-content-wrapper{
  border-radius:10px;
  box-shadow:0 4px 24px rgba(0,0,0,.1);
  border:1px solid var(--border);
}
.leaflet-popup-content{margin:10px 12px;min-width:150px}
.popup-img{
  width:100%;height:88px;object-fit:cover;
  border-radius:6px;margin-bottom:7px;display:block;
}
.popup-name{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:500;color:var(--text-1);
}
.popup-sub{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11px;font-style:italic;color:var(--text-3);margin-top:2px;
}
.photo-marker{
  width:38px;height:38px;border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  overflow:hidden;position:relative;cursor:pointer;background:#ccc;
}
.photo-marker img{width:100%;height:100%;object-fit:cover;display:block}
.photo-marker .badge{
  position:absolute;bottom:-2px;right:-2px;
  width:15px;height:15px;border-radius:50%;
  background:var(--text-1);
  color:#fff;font-size:7px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid #fff;
}
</style>
</head>

// ─── MAP INIT ──────────────────────────
let fsMapId=null;

function buildGmapsUrl(pts){
  if(!pts||!pts.length)return'#';
  if(pts.length===1)return`https://www.google.com/maps/search/?api=1&query=${pts[0].lat},${pts[0].lng}`;
  const o=`${pts[0].lat},${pts[0].lng}`,de=`${pts[pts.length-1].lat},${pts[pts.length-1].lng}`;
  const wp=pts.slice(1,-1).map(p=>`${p.lat},${p.lng}`).join('|');
  let url=`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${de}&travelmode=walking`;
  if(wp)url+=`&waypoints=${encodeURIComponent(wp)}`;
  return url;
}

function initMap(i){
  if(mapInst[i])return;
  const d=DAYS[i];
  const pts=d.places.filter(p=>p.lat);
  const el=document.getElementById('map-'+i);
  if(!el||!pts.length)return;
  const map=L.map(el,{zoomControl:false,scrollWheelZoom:false,attributionControl:false});
  L.control.zoom({position:'topright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
  if(pts.length>1)L.polyline(pts.map(p=>[p.lat,p.lng]),{color:'#111110',weight:2,opacity:.5,dashArray:'5,5'}).addTo(map);
  pts.forEach((pl,idx)=>{
    const n=idx+1;
    const html=`<div class="photo-marker" title="${pl.name}">
      <img src="${pl.img}" alt="" loading="lazy"
        onerror="this.style.display='none';this.parentNode.style.background='#888'">
      <div class="badge">${n}</div>
    </div>`;
    const icon=L.divIcon({className:'',html,iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-22]});
    L.marker([pl.lat,pl.lng],{icon}).addTo(map).bindPopup(`
      <img class="popup-img" src="${pl.img}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="popup-name">${n}. ${pl.name}</div>
      <div class="popup-sub">${pl.jp||''} · ${pl.price}</div>
    `);
  });
  if(pts.length===1)map.setView([pts[0].lat,pts[0].lng],14);
  else map.fitBounds(L.latLngBounds(pts.map(p=>[p.lat,p.lng])).pad(0.25));
  mapInst[i]=map;
  setTimeout(()=>map.invalidateSize(),0);
  const btn=document.getElementById('gmap-'+i);
  if(btn)btn.href=buildGmapsUrl(pts);
  const fsOpen=document.getElementById('fsopen-'+i);
  const fsClose=document.getElementById('fsclose-'+i);
  if(fsOpen)fsOpen.onclick=()=>openMapFullscreen(i);
  if(fsClose)fsClose.onclick=()=>closeMapFullscreen();
}

function openMapFullscreen(i){
  const wrap=document.getElementById('mapwrap-'+i);
  if(!wrap||fsMapId!==null)return;
  fsMapId=i;
  wrap.classList.add('map-wrap--fullscreen');
  document.body.classList.add('map-fs-open');
  setTimeout(()=>{
    if(mapInst[i]){
      mapInst[i].scrollWheelZoom.enable();
      mapInst[i].invalidateSize();
    }
  },50);
}

function closeMapFullscreen(){
  if(fsMapId===null)return;
  const wrap=document.getElementById('mapwrap-'+fsMapId);
  if(wrap)wrap.classList.remove('map-wrap--fullscreen');
  document.body.classList.remove('map-fs-open');
  const id=fsMapId;
  fsMapId=null;
  setTimeout(()=>{
    if(mapInst[id]){
      mapInst[id].scrollWheelZoom.disable();
      mapInst[id].invalidateSize();
    }
  },50);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&fsMapId!==null)closeMapFullscreen();
});

function showDay(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const pid=typeof id==='number'?'panel-'+id:'panel-exp';
  document.getElementById(pid).classList.add('active');
  const tabs=[...document.querySelectorAll('.tab')];
  const ti=typeof id==='number'?id:DAYS.length;
  if(tabs[ti])tabs[ti].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(typeof id==='number'){
    if(fsMapId!==null&&fsMapId!==id)closeMapFullscreen();
    setTimeout(()=>{initMap(id);if(mapInst[id])mapInst[id].invalidateSize();},80);
  }
}

setTimeout(()=>initMap(0),120);
