<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Япония · 17–30 сентября</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;
  --surface:#FFFFFF;
  --surface-dim:#F3F3F1;
  --border:#E3E3E0;
  --border-strong:#C4C4C0;
  --text-1:#111110;
  --text-2:#5A5A57;
  --text-3:#9A9A97;
  --r:12px;
  --page-max:1008px;
  --viewport-pad:32px;
  --cards-gap:32px;
  --cards-cols:3;
  --card-max:288px;
  --card-w:min(
    var(--card-max),
    calc((min(100vw,var(--page-max)) - var(--viewport-pad) - (var(--cards-cols) - 1) * var(--cards-gap)) / var(--cards-cols))
  );
  --cards-row-w:calc(var(--cards-cols) * var(--card-w) + (var(--cards-cols) - 1) * var(--cards-gap));
  --content-w:var(--cards-row-w);
}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text-1);
  font-size:15px;
  font-weight:400;
  line-height:normal;
  letter-spacing:-0.648px;
}
.jp{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif}

/* ─── VIEW NAV ─── */
.view-nav{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
  padding:10px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.view-nav-inner{
  display:flex;gap:4px;
  flex:1;
}
.view-btn{
  flex:1;
  text-align:center;
  padding:8px 12px;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:400;
  color:var(--text-3);
  cursor:pointer;
  border-radius:20px;
  border:1px solid transparent;
  transition:all .15s ease;
  user-select:none;letter-spacing:-0.3px;
}
.view-btn.active{
  color:#fff;font-weight:600;
  background:var(--text-1);
  border-color:var(--text-1);
}
.view-btn:hover:not(.active){color:var(--text-1);background:var(--surface-dim)}
.view-nav-bar{
  display:flex;
  align-items:center;
  gap:12px;
  width:var(--content-w);
  max-width:calc(100vw - var(--viewport-pad));
}
.view-nav-title{
  display:none;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:600;
  color:var(--text-1);
  letter-spacing:-0.3px;
}
.burger-btn{
  display:none;
  width:36px;height:36px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--surface);
  cursor:pointer;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:0;flex-shrink:0;
  margin-left:auto;
  -webkit-tap-highlight-color:transparent;
}
.burger-btn span{
  display:block;width:16px;height:1.5px;
  background:var(--text-1);border-radius:1px;
  transition:transform .2s,opacity .2s;
}
body.menu-open .burger-btn span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
body.menu-open .burger-btn span:nth-child(2){opacity:0}
body.menu-open .burger-btn span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mobile-menu{
  display:none;
  position:absolute;left:0;right:0;top:100%;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:8px 16px 12px;
  flex-direction:column;gap:4px;
  z-index:210;
}
body.menu-open .mobile-menu{display:flex}
.mobile-menu-item{
  width:100%;
  text-align:left;
  padding:12px 14px;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:14px;font-weight:400;
  color:var(--text-2);
  cursor:pointer;
  border-radius:12px;
  border:none;background:transparent;
  letter-spacing:-0.3px;
}
.mobile-menu-item.active,.mobile-menu-item:hover{
  color:var(--text-1);
  background:var(--surface-dim);
  font-weight:600;
}
body.mode-places .tabs-wrap{display:none}
body.mode-expenses .tabs-wrap{display:none}
body.mode-route #panel-places{display:none}
@media (max-width:640px){
  body.mode-route #panel-exp{display:none}
  body.mode-expenses .panel:not(#panel-exp){display:none}
  body.mode-expenses #panel-exp{display:flex}
  .view-nav{padding:10px 16px;justify-content:center}
  .view-nav-bar{width:100%;max-width:none}
  .view-nav-inner{display:none}
  .burger-btn{display:flex}
  .view-nav-title{display:block;flex:1;text-align:left}
  .tab-exp{display:none!important}
}
@media (min-width:641px){
  .mobile-menu{display:none!important}
  body.mode-route #panel-exp{display:flex}
  .view-nav-bar{width:var(--content-w)}
  .view-nav-inner{width:100%}
}

/* ─── TABS ─── */
.tabs-wrap{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  position:sticky;top:49px;z-index:190;
  min-height:52px;
  box-sizing:border-box;
  padding:10px 0;
  overflow:visible;
  display:flex;
  align-items:center;
  justify-content:center;
}
.tabs-scroll{
  overflow-x:auto;
  overflow-y:visible;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  width:var(--content-w);
  max-width:calc(100vw - var(--viewport-pad));
  margin:0 auto;
  min-height:32px;
}
.tabs-scroll::-webkit-scrollbar{display:none}
.tabs{display:inline-flex;flex-wrap:nowrap;align-items:center;padding:0 12px;gap:4px;width:max-content}
.tab{
  display:inline-block;
  flex-shrink:0;
  line-height:1.2;
  padding:7px 12px;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11.5px;font-weight:400;
  color:var(--text-3);
  cursor:pointer;
  border-radius:20px;
  border:1px solid transparent;
  transition:all .15s ease;
  white-space:nowrap;user-select:none;
  letter-spacing:-0.3px;
}
.tab.active{
  color:#fff;font-weight:600;
  background:var(--text-1);
  border-color:var(--text-1);
}
.tab:hover:not(.active){color:var(--text-1);background:var(--surface-dim)}

/* ─── PANEL ─── */
#panels{padding-bottom:32px}
.panel{
  display:flex;
  flex-direction:column;
  align-items:center;
  max-width:none;
  width:100%;
  margin:0 auto;
  padding:40px 0 64px;
  scroll-margin-top:105px;
}
.panel > *{
  width:var(--content-w);
  max-width:calc(100vw - var(--viewport-pad));
}
#panel-places > .city-section{
  width:100%;
  max-width:none;
}
.panel:first-child{padding-top:24px}
.panel{position:relative}
.panel+.panel::before{
  content:'';
  position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:100vw;
  border-top:1px solid var(--border);
  pointer-events:none;
}
body.mode-places .panel:not(#panel-places){display:none}
body.mode-places #panel-places{display:flex}
#panel-places{display:none}
#panel-places .city-section{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:48px;
}
#panel-places .city-section:last-child{margin-bottom:0}
#panel-places .city-section > *{
  width:var(--content-w);
  max-width:calc(100vw - var(--viewport-pad));
}
#panel-places .city-section .map-wrap{margin-bottom:24px}
.city-title{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:28px;font-weight:700;
  color:var(--text-1);
  line-height:1.1;
  margin-bottom:20px;
  letter-spacing:-0.5px;
}
.city-title-jp{font-weight:400}

/* ─── DAY HEADER ─── */
.day-header{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:28px;
  padding-top:4px;
}
.day-index{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:400;
  color:var(--text-3);
  text-transform:lowercase;
  line-height:11px;
}
.day-title{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:48px;
  color:var(--text-1);
  line-height:45.6px;
}
.day-city{font-weight:700}
.day-city-jp{font-weight:400}

/* ─── NOTE ─── */
.day-note{
  background:var(--surface-dim);
  border-left:2px solid var(--text-1);
  padding:12px 16px;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;
  color:var(--text-2);
  margin-bottom:24px;
  line-height:1.6;
  letter-spacing:-0.4px;
}

/* ─── SECTION LABEL ─── */
.section-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:400;
  color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:12px;margin-top:4px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{display:none}

/* ─── MAP ─── */
.map-wrap{
  border-radius:var(--r);
  overflow:hidden;
  border:1px solid var(--border);
  background:#EAE8E4;
  margin-bottom:28px;
  position:relative;
  z-index:1;
}
.day-map{height:220px}
.map-actions{
  position:absolute;bottom:12px;left:12px;right:12px;
  display:flex;gap:8px;justify-content:center;
  z-index:500;pointer-events:none;
}
.map-btn{
  pointer-events:auto;
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.97);
  border:1px solid var(--border);
  color:var(--text-1);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11px;font-weight:600;
  padding:7px 14px;border-radius:20px;
  text-decoration:none;white-space:nowrap;
  letter-spacing:.02em;
  transition:background .15s,color .15s,border-color .15s;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.map-btn:hover,.map-btn:focus-visible{background:var(--text-1);color:#fff;border-color:var(--text-1);outline:none}
.map-btn--icon{
  position:absolute;top:10px;right:10px;z-index:401;
  width:32px;height:32px;padding:0;border-radius:8px;
  justify-content:center;
}
.map-wrap .leaflet-top.leaflet-right{top:50%;right:10px;transform:translateY(-50%)}
.map-wrap .leaflet-control-zoom{margin-top:0!important}
.map-wrap--fullscreen .map-btn--fs{display:none}
.map-fs-top{
  display:none;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.map-fs-title{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:600;color:var(--text-1);letter-spacing:-.3px;
}
.map-fs-close{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.map-fs-close:hover{background:var(--text-1);color:#fff}
body.map-fs-open{overflow:hidden}
.map-wrap--fullscreen{
  position:fixed;inset:0;z-index:3000;
  margin:0;border-radius:0;border:none;
  display:flex;flex-direction:column;
  background:var(--bg);
  width:auto;max-width:none;
  overflow:hidden;
}
.map-wrap--fullscreen .map-fs-top{
  display:flex;
  position:relative;
  z-index:1000;
  flex-shrink:0;
}
.map-wrap--fullscreen .day-map{flex:1;height:auto!important;min-height:0}
.map-wrap--fullscreen .map-actions{bottom:20px;left:16px;right:16px}

/* ─── TRANSIT ─── */
.transit{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 16px;
  margin-bottom:10px;
  display:flex;gap:14px;align-items:flex-start;
}
.transit-icon-wrap{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--text-2);
}
.transit-body{flex:1;min-width:0}
.transit-route{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:700;
  color:var(--text-1);line-height:1.3;
  letter-spacing:-0.4px;
}
.transit-detail{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;
  color:var(--text-3);margin-top:2px;
  letter-spacing:-0.3px;
}
.transit-cost{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:600;
  color:var(--text-2);margin-top:5px;
  letter-spacing:.01em;
}

/* ─── PLACE CARD ─── */
.places-grid{
  display:grid;
  grid-template-columns:repeat(3,var(--card-w));
  gap:var(--cards-gap);
  margin-bottom:28px;
  justify-content:center;
}
.place{
  width:100%;
  max-width:var(--card-w);
  background:var(--surface);
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:18px;
  height:100%;
}
.place-photo-wrap{
  position:relative;
  align-self:stretch;
  width:100%;
  height:var(--card-w);
  border-radius:24px;
  overflow:hidden;
  background:var(--surface-dim);
}
.place-photo{
  width:100%;height:100%;
  object-fit:cover;display:block;
}
.place-photo-err{
  position:absolute;inset:0;
  background:var(--surface-dim);
  display:none;align-items:center;justify-content:center;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;color:var(--text-3);
}
.place-num{
  position:absolute;top:14px;left:14px;
  width:28px;height:28px;
  background:rgba(255,255,255,.96);
  border-radius:6px;
  color:var(--text-1);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  letter-spacing:.02em;z-index:2;
}
.place-body{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-self:stretch;
  width:100%;
}
.place-head{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.place-titles{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.place-jp{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:400;
  color:var(--text-1);
  letter-spacing:.44px;
  line-height:12px;
}
.place-name{
  font-family:Inter,"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:18px;font-weight:700;
  color:var(--text-1);
  line-height:21.25px;
}
.place-name-short{display:none}
.place-desc{
  font-family:Inter,"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:400;
  color:rgba(17,17,16,.75);
  line-height:17px;
}
.place-meta{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.place-meta-item{
  font-family:Inter,"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:400;
  line-height:17px;
  color:rgba(90,90,87,.6);
}
.place-meta-sep{
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(90,90,87,.45);
  flex-shrink:0;
}
@media (min-width:961px){
  .place{
    height:auto;
    align-self:start;
  }
}
@media (max-width:960px){
  :root{
    --page-max:640px;
    --cards-cols:2;
  }
  .places-grid{grid-template-columns:repeat(2,var(--card-w))}
  .place-jp{
    display:-webkit-box;
    -webkit-box-orient:vertical;
    -webkit-line-clamp:1;
    overflow:hidden;
    line-height:12px;
    font-size:clamp(10px,3vw,12px);
  }
  .place-name-full{display:none}
  .place-name-short{
    display:block;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .place-desc{
    display:-webkit-box;
    -webkit-box-orient:vertical;
    -webkit-line-clamp:3;
    overflow:hidden;
    min-height:51px;
    font-size:clamp(11px,3.2vw,13px);
    line-height:17px;
  }
  .place-meta-item{font-size:clamp(11px,3.2vw,13px)}
}
@media (max-width:640px){
  :root{--cards-gap:24px}
  .day-title{
    font-size:clamp(32px,12vw,48px);
    line-height:1.05;
  }
  .city-title{
    font-size:clamp(22px,8vw,28px);
    margin-bottom:16px;
  }
}
@media (max-width:380px){
  :root{--cards-gap:16px;--viewport-pad:24px}
}

/* ─── BUDGET ─── */
.budget-block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  margin-top:24px;
}
.budget-block h3{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:300;font-style:italic;
  color:var(--text-3);letter-spacing:.08em;
  margin-bottom:14px;
}
.budget-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.budget-row:last-child{border-bottom:none;padding-top:14px;margin-top:4px}
.budget-row:last-child .budget-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:14px;font-weight:500;color:var(--text-1);
}
.budget-row:last-child .budget-val{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:18px;font-weight:700;color:var(--text-1);
  letter-spacing:-.01em;
}
.budget-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-style:italic;color:var(--text-2);
}
.budget-val{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:600;color:var(--text-1);
}

/* ─── EXPENSES ─── */
.exp-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  margin-bottom:12px;
}
.exp-section h3{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:15px;font-weight:500;color:var(--text-1);
  margin-bottom:14px;
}
.exp-row{
  display:flex;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);
  gap:16px;
}
.exp-row:last-child{border-bottom:none}
.exp-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-style:italic;color:var(--text-2);flex:1;
}
.exp-val{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:600;color:var(--text-1);
  text-align:right;white-space:nowrap;
}
.exp-total{
  background:var(--text-1);
  color:#fff;
  border-radius:var(--r);
  padding:32px 24px;
  margin-top:8px;text-align:center;
}
.exp-total .t-label{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:10px;font-weight:300;font-style:italic;
  opacity:.5;margin-bottom:12px;letter-spacing:.06em;
}
.exp-total .t-jpy{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:52px;font-weight:400;
  letter-spacing:-.03em;line-height:1;
}
.exp-total .t-rub{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:14px;opacity:.5;margin-top:8px;font-style:italic;
}

/* ─── LEAFLET ─── */
.leaflet-top.leaflet-right{margin:0!important}
.leaflet-control-zoom{border:none!important;box-shadow:none!important;margin:0!important}
.leaflet-control-zoom a{
  background:rgba(255,255,255,.97)!important;
  border:1px solid var(--border)!important;
  color:var(--text-1)!important;
  width:32px!important;height:32px!important;
  line-height:30px!important;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif!important;
  font-size:18px!important;font-weight:400!important;
  transition:background .15s,color .15s!important;
}
.leaflet-control-zoom a:hover{
  background:var(--text-1)!important;
  color:#fff!important;
}
.leaflet-control-zoom-in{border-radius:8px 8px 0 0!important;margin-bottom:-1px!important}
.leaflet-control-zoom-out{border-radius:0 0 8px 8px!important}
.leaflet-bar a.leaflet-disabled{
  background:var(--surface-dim)!important;
  color:var(--text-3)!important;
  cursor:default!important;
}
.leaflet-popup-content-wrapper{
  border-radius:10px;
  box-shadow:0 4px 24px rgba(0,0,0,.1);
  border:1px solid var(--border);
}
.leaflet-popup-content{margin:10px 12px;min-width:150px}
.popup-img{
  width:100%;height:88px;object-fit:cover;
  border-radius:6px;margin-bottom:7px;display:block;
}
.popup-name{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:500;color:var(--text-1);
}
.popup-sub{
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:11px;font-style:italic;color:var(--text-3);margin-top:2px;
}
.photo-marker{
  width:38px;height:38px;border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  overflow:hidden;position:relative;cursor:pointer;background:#ccc;
}
.photo-marker img{width:100%;height:100%;object-fit:cover;display:block}
.photo-marker .badge{
  position:absolute;bottom:-2px;right:-2px;
  width:15px;height:15px;border-radius:50%;
  background:var(--text-1);
  color:#fff;font-size:7px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid #fff;
}
.photo-marker--off-route{
  border-color:#E53935;
  box-shadow:0 0 0 2px rgba(229,57,53,.4),0 2px 8px rgba(0,0,0,.2);
}
.stay-marker{
  width:38px;height:38px;border-radius:50%;
  border:2px solid rgba(255,255,255,.95);
  box-shadow:0 2px 8px rgba(0,0,0,.22);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;
}
.stay-marker--home{background:#C2410C}
.stay-marker--apt{background:#6D28D9}
.photo-marker--home{
  border-color:#C2410C;
  box-shadow:0 0 0 2px rgba(194,65,12,.35),0 2px 8px rgba(0,0,0,.2);
}
.photo-marker--apt{
  border-color:#6D28D9;
  box-shadow:0 0 0 2px rgba(109,40,217,.45),0 2px 8px rgba(0,0,0,.2);
}
.popup-link{
  display:inline-block;margin-top:8px;
  font-family:Inter,"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:12px;font-weight:500;color:var(--text-1);
  text-decoration:underline;
}
.map-day-filters{
  position:absolute;top:10px;left:10px;z-index:450;
  background:rgba(255,255,255,.97);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 10px;

  overflow-y:auto;
  pointer-events:auto;

  scrollbar-width:thin;
}
.map-day-filter{

}
.map-day-filter--all{

}
.map-day-swatch{

}
.map-wrap--fullscreen .map-day-filters{
  top:14px;left:14px;max-height:min(40vh,220px);
}

const TYPO_WORDS='через|около|перед|после|между|ещё|уже|все|там|тут|где|или|что|как|это|при|для|про|над|под|без|под|со|об|во|не|на|но|ни|от|до|за|из|по|да|ли|же|бы|а|и|к|с|у|о|в|я';
function typografRu(s){
  if(!s)return s;
  const nbsp='\u00A0';
  return s.replace(
    new RegExp(`(^|[\\s(—–\\-«])(${TYPO_WORDS})\\s(?=[а-яёА-ЯЁ«"№0-9])`,'gi'),
    (m,pre,w)=>pre+w+nbsp
  );
}
function formatDesc(desc){
  if(!desc)return desc;
  return typografRu(desc.replace(/\.\s*$/,''));
}
function formatMoney(s){
  if(!s)return s;
  if(s==='Бесплатно'||s==='¥0')return s;
  if(/\([^)]*₽\)/.test(s))return s;
  const parts=s.split(/\s*·\s*/);
  if(parts.length!==2)return s;
  const jpy=parts[0].trim();
  const rub=parts[1].trim().replace(/\s*₽\s*$/,'').trim();
  return `${jpy} (${rub}₽)`;
}
function formatMoneyPair(jpy,rub){
  if(!rub)return jpy;
  const r=rub.replace(/\s*₽\s*$/,'').trim();
  return `${jpy} (${r}₽)`;
}

const DAY_ROUTE_COLORS=['#111110','#1D4ED8','#047857','#B45309','#6D28D9','#BE185D','#0E7490','#A16207','#B91C1C','#4338CA','#0F766E','#7E22CE','#C2410C','#475569'];

function buildRegionDayRoutes(){
  const byRegion={};
  REGIONS.forEach(r=>{byRegion[r.id]=[];});
  DAYS.forEach((d,i)=>{
    const rid=DAY_REGION[i];
    const pts=d.places.filter(p=>p.lat);
    if(!pts.length)return;
    byRegion[rid].push({dayIdx:i,tab:d.tab,city:d.city,places:pts});
  });
  return byRegion;
}
const regionDayRoutes=buildRegionDayRoutes();
const cityMapState={};

function dayFilterLabel(tab){
  const m=tab.match(/^(\d{1,2})\s+сент/);
  return m?`${m[1].padStart(2,'0')}.09`:tab;
}

function renderDayFilters(regionId){
  const days=regionDayRoutes[regionId];
  if(!days.length)return'';
  return`<div class="map-day-filters" data-region="${regionId}">
    <label class="map-day-filter map-day-filter--all">
      <input type="checkbox" class="map-day-cb-all" data-region="${regionId}" checked>
      Все
    </label>
    ${days.map(d=>`
    <label class="map-day-filter">
      <input type="checkbox" class="map-day-cb" data-region="${regionId}" data-day="${d.dayIdx}" checked>
      <span class="map-day-swatch" style="background:${DAY_ROUTE_COLORS[d.dayIdx%DAY_ROUTE_COLORS.length]}"></span>
      ${dayFilterLabel(d.tab)}
    </label>`).join('')}
  </div>`;
}

function buildPlacesCatalog(){
  const byRegion={};
  REGIONS.forEach(r=>{byRegion[r.id]=[];});
  const seen=new Set();
  DAYS.forEach((d,i)=>{
    const rid=DAY_REGION[i];
    d.places.forEach(pl=>{
      if(seen.has(pl.name))return;
      seen.add(pl.name);
      byRegion[rid].push(pl);
    });
  });
  Object.entries(EXTRA_PLACES).forEach(([rid,extras])=>{
    extras.forEach(pl=>{
      if(seen.has(pl.name))return;
      seen.add(pl.name);
      byRegion[rid].push({...pl,offRoute:true});
    });
  });
  return byRegion;
}

let fsMapId=null;
let fsRestore=null;

function ensureMapReady(mapId){
  if(mapInst[mapId])return;
  const s=String(mapId);
  if(/^\d+$/.test(s))initMap(+s);
  else if(s.startsWith('city-')){
    const regionId=s.slice(5);
    const items=placesCatalog[regionId];
    if(items?.length)initCityMap(regionId,items);
  }
}

function resizeMap(mapId){
  const m=mapInst[mapId];
  if(!m)return;
  m.invalidateSize();
}

function buildGmapsUrl(pts){
  if(!pts||!pts.length)return'#';
  if(pts.length===1)return`https://www.google.com/maps/search/?api=1&query=${pts[0].lat},${pts[0].lng}`;
  const o=`${pts[0].lat},${pts[0].lng}`,de=`${pts[pts.length-1].lat},${pts[pts.length-1].lng}`;
  const wp=pts.slice(1,-1).map(p=>`${p.lat},${p.lng}`).join('|');
  let url=`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${de}&travelmode=walking`;
  if(wp)url+=`&waypoints=${encodeURIComponent(wp)}`;
  return url;
}

function buildGmapsCenterUrl(pts){
  if(!pts||!pts.length)return'#';
  const lat=pts.reduce((s,p)=>s+p.lat,0)/pts.length;
  const lng=pts.reduce((s,p)=>s+p.lng,0)/pts.length;
  return`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
}

function formatRub(n){
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' ₽';
}

function getRegionStays(regionId){
  const s=STAYS[regionId];
  return s?Array.isArray(s)?s:[s]:[];
}

function stayPopupHtml(stay){
  const price=stay.priceRub?`<div class="popup-sub" style="font-style:normal;margin-top:6px">${formatRub(stay.priceRub)} · ${formatRub(stay.priceRub/2)}/чел</div>`:'';
  const dates=stay.dates?`<div class="popup-sub" style="font-style:normal">${stay.dates}</div>`:'';
  const link=stay.link?`<a class="popup-link" href="${stay.link}" target="_blank" rel="noopener">Trip.com</a>`:'';
  const photo=stay.img?`<img class="popup-img" src="${stay.img}" alt="" loading="lazy" onerror="this.style.display='none'">`:'';
  return`${photo}
    <div class="popup-name">${stay.name}</div>
    <div class="popup-sub">${stay.jp||''}</div>
    <div class="popup-sub" style="font-style:normal;margin-top:6px;line-height:1.35">${stay.address}</div>
    ${dates}${price}${link}`;
}

function fitMapToPoints(map,pts,regionId,padding=0.25){
  const coords=pts.filter(p=>p.lat).map(p=>[p.lat,p.lng]);
  getRegionStays(regionId).forEach(stay=>coords.push([stay.lat,stay.lng]));
  if(!coords.length)return;
  if(coords.length===1)map.setView(coords[0],14);
  else map.fitBounds(L.latLngBounds(coords).pad(padding));
}

function addStayMarkers(map,regionId){
  getRegionStays(regionId).forEach(stay=>{
    const kind=stay.kind==='apt'?'apt':'home';
    const fallback=kind==='apt'?'#6D28D9':'#C2410C';
    const html=stay.img
      ?`<div class="photo-marker photo-marker--${kind}" title="${stay.name}">
          <img src="${stay.img}" alt="" loading="lazy"
            onerror="this.style.display='none';this.parentNode.style.background='${fallback}'">
        </div>`
      :`<div class="stay-marker stay-marker--${kind}" title="${stay.name}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21V12h6v9"/></svg>
        </div>`;
    const icon=L.divIcon({className:'',html,iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-22]});
    L.marker([stay.lat,stay.lng],{icon}).addTo(map).bindPopup(stayPopupHtml(stay));
  });
}

function createMap(mapId,pts,{numbered=false,route=false,regionId=null}={}){
  const el=document.getElementById('map-'+mapId);
  if(!el||!pts.length)return null;
  const map=L.map(el,{zoomControl:false,scrollWheelZoom:false,attributionControl:false});
  L.control.zoom({position:'topright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
  if(route&&pts.length>1)L.polyline(pts.map(p=>[p.lat,p.lng]),{color:'#111110',weight:2,opacity:.5,dashArray:'5,5'}).addTo(map);
  pts.forEach((pl,idx)=>{
    const n=idx+1;
    const badge=numbered?`<div class="badge">${n}</div>`:'';
    const offCls=pl.offRoute?' photo-marker--off-route':'';
    const html=`<div class="photo-marker${offCls}" title="${pl.name}">
      <img src="${pl.img}" alt="" loading="lazy"
        onerror="this.style.display='none';this.parentNode.style.background='#888'">
      ${badge}
    </div>`;
    const icon=L.divIcon({className:'',html,iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-22]});
    const offNote=pl.offRoute?'<div class="popup-sub" style="color:#E53935;font-style:normal">не в маршруте</div>':'';
    L.marker([pl.lat,pl.lng],{icon}).addTo(map).bindPopup(`
      <img class="popup-img" src="${pl.img}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="popup-name">${numbered?n+'. ':''}${pl.name}</div>
      <div class="popup-sub">${pl.jp||''} · ${pl.price}</div>
      ${offNote}
    `);
  });
  addStayMarkers(map,regionId);
  fitMapToPoints(map,pts,regionId,0.25);
  setTimeout(()=>map.invalidateSize(),0);
  const gmap=document.getElementById('gmap-'+mapId);
  if(gmap)gmap.href=route?buildGmapsUrl(pts):buildGmapsCenterUrl(pts);
  return map;
}

function initMap(i){
  if(mapInst[i])return;
  const pts=DAYS[i].places.filter(p=>p.lat);
  const map=createMap(i,pts,{numbered:true,route:true,regionId:DAY_REGION[i]});
  if(map)mapInst[i]=map;
}

function initCityMap(regionId,places){
  const mapId='city-'+regionId;
  if(mapInst[mapId])return;
  const el=document.getElementById('map-'+mapId);
  const pts=places.filter(p=>p.lat);
  if(!el||!pts.length)return;
  const map=L.map(el,{zoomControl:false,scrollWheelZoom:false,attributionControl:false});
  L.control.zoom({position:'topright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);

  const dayLines={};
  (regionDayRoutes[regionId]||[]).forEach(dr=>{
    if(dr.places.length<2)return;
    const color=DAY_ROUTE_COLORS[dr.dayIdx%DAY_ROUTE_COLORS.length];
    dayLines[dr.dayIdx]=L.polyline(dr.places.map(p=>[p.lat,p.lng]),{
      color,weight:2.5,opacity:0.75,dashArray:'6,5',
    }).addTo(map);
  });

  pts.forEach(pl=>{
    const offCls=pl.offRoute?' photo-marker--off-route':'';
    const html=`<div class="photo-marker${offCls}" title="${pl.name}">
      <img src="${pl.img}" alt="" loading="lazy"
        onerror="this.style.display='none';this.parentNode.style.background='#888'">
    </div>`;
    const icon=L.divIcon({className:'',html,iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-22]});
    const offNote=pl.offRoute?'<div class="popup-sub" style="color:#E53935;font-style:normal">не в маршруте</div>':'';
    L.marker([pl.lat,pl.lng],{icon}).addTo(map).bindPopup(`
      <img class="popup-img" src="${pl.img}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="popup-name">${pl.name}</div>
      <div class="popup-sub">${pl.jp||''} · ${pl.price}</div>
      ${offNote}
    `);
  });

  addStayMarkers(map,regionId);
  fitMapToPoints(map,pts,regionId,0.22);
  setTimeout(()=>map.invalidateSize(),0);
  const gmap=document.getElementById('gmap-'+mapId);
  if(gmap)gmap.href=buildGmapsCenterUrl(pts);
  mapInst[mapId]=map;
  cityMapState[regionId]={map,dayLines};
  wireDayFilters(regionId);
}

function wireDayFilters(regionId){
  const wrap=document.querySelector(`.map-day-filters[data-region="${regionId}"]`);
  const state=cityMapState[regionId];
  if(!wrap||!state)return;
  const allCb=wrap.querySelector('.map-day-cb-all');
  const dayCbs=[...wrap.querySelectorAll('.map-day-cb')];
  if(!allCb||!dayCbs.length)return;

  function updateRoutes(){
    const showAll=allCb.checked;
    dayCbs.forEach(cb=>{
      const line=state.dayLines[+cb.dataset.day];
      if(!line)return;
      const show=showAll||cb.checked;
      if(show){
        if(!state.map.hasLayer(line))line.addTo(state.map);
      }else{
        state.map.removeLayer(line);
      }
    });
  }

  allCb.addEventListener('change',()=>{
    if(allCb.checked)dayCbs.forEach(cb=>{cb.checked=true;});
    updateRoutes();
  });
  dayCbs.forEach(cb=>{
    cb.addEventListener('change',()=>{
      if(!cb.checked)allCb.checked=false;
      else if(dayCbs.every(c=>c.checked))allCb.checked=true;
      updateRoutes();
    });
  });
}

function initAllCityMaps(){
  REGIONS.forEach(r=>{
    const items=placesCatalog[r.id];
    if(items.length)initCityMap(r.id,items);
  });
  setTimeout(()=>{
    REGIONS.forEach(r=>{
      const m=mapInst['city-'+r.id];
      if(m)m.invalidateSize();
    });
  },120);
}

function openMapFullscreen(mapId){
  const wrap=document.getElementById('mapwrap-'+mapId);
  if(!wrap||fsMapId!==null)return;
  ensureMapReady(mapId);
  fsMapId=mapId;
  const placeholder=document.createComment('map-fs-'+mapId);
  wrap.parentNode.insertBefore(placeholder,wrap.nextSibling);
  fsRestore={placeholder};
  document.body.appendChild(wrap);
  wrap.classList.add('map-wrap--fullscreen');
  document.body.classList.add('map-fs-open');
  const m=mapInst[mapId];
  if(m)m.scrollWheelZoom.enable();
  resizeMap(mapId);
  requestAnimationFrame(()=>{
    resizeMap(mapId);
    setTimeout(()=>resizeMap(mapId),80);
    setTimeout(()=>resizeMap(mapId),250);
  });
}

function closeMapFullscreen(){
  if(fsMapId===null)return;
  const id=fsMapId;
  const wrap=document.getElementById('mapwrap-'+id);
  if(wrap){
    wrap.classList.remove('map-wrap--fullscreen');
    const ph=fsRestore?.placeholder;
    if(ph?.parentNode){
      ph.parentNode.insertBefore(wrap,ph);
      ph.remove();
    }
  }
  document.body.classList.remove('map-fs-open');
  fsMapId=null;
  fsRestore=null;
  const m=mapInst[id];
  if(!m)return;
  m.scrollWheelZoom.disable();
  requestAnimationFrame(()=>{
    resizeMap(id);
    setTimeout(()=>resizeMap(id),50);
    setTimeout(()=>resizeMap(id),200);
    setTimeout(()=>resizeMap(id),400);
  });
}

document.addEventListener('click',e=>{
  const openBtn=e.target.closest('.map-btn--fs');
  if(openBtn){
    e.preventDefault();
    e.stopPropagation();
    openMapFullscreen(openBtn.id.replace('fsopen-',''));
    return;
  }
  if(e.target.closest('.map-fs-close')){
    e.preventDefault();
    e.stopPropagation();
    closeMapFullscreen();
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&fsMapId!==null)closeMapFullscreen();
  if(e.key==='Escape'&&document.body.classList.contains('menu-open'))closeMobileMenu();

  document.body.classList.remove('menu-open');
  const btn=document.getElementById('burger-btn');
  if(btn)btn.setAttribute('aria-expanded','false');
}

function openMobileMenu(){
  document.body.classList.add('menu-open');
  const btn=document.getElementById('burger-btn');
  if(btn)btn.setAttribute('aria-expanded','true');
}

function toggleMobileMenu(){
  if(document.body.classList.contains('menu-open'))closeMobileMenu();
  else openMobileMenu();
}

function setView(mode){
  currentView=mode;
  document.body.classList.remove('mode-places','mode-expenses');
  document.body.classList.add(
    mode==='places'?'mode-places':mode==='expenses'?'mode-expenses':'mode-route'
  );
  const labels={route:'Маршрут',places:'Места',expenses:'Расходы'};
  document.querySelectorAll('.view-btn,.mobile-menu-item').forEach(b=>{
    b.classList.toggle('active',b.dataset.view===mode);
  });
  const titleEl=document.getElementById('view-nav-title');
  if(titleEl)titleEl.textContent=labels[mode]||'Маршрут';
  closeMobileMenu();
  scrollLock=true;
  clearTimeout(scrollLockTimer);
  window.scrollTo({top:0,behavior:'smooth'});
  scrollLockTimer=setTimeout(()=>{scrollLock=false;},600);
  if(mode==='places')setTimeout(()=>initAllCityMaps(),80);
  else if(mode==='route'&&!mapInst[0])setTimeout(()=>initMap(0),120);
}

document.getElementById('burger-btn')?.addEventListener('click',toggleMobileMenu);
document.querySelectorAll('.mobile-menu-item').forEach(btn=>{
  btn.onclick=()=>setView(btn.dataset.view);
});
document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.onclick=()=>setView(btn.dataset.view);
});
document.addEventListener('click',e=>{
  if(!isMobileNav()||!document.body.classList.contains('menu-open'))return;
  if(e.target.closest('.view-nav'))return;
  closeMobileMenu();
});

function setActiveTab(index){
  const tabs=[...document.querySelectorAll('.tab')];
  tabs.forEach((t,i)=>t.classList.toggle('active',i===index));
  if(index!==currentActive){
    currentActive=index;
    const active=tabs[index];
    if(active)active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  }
}

function scrollToDay(id){
  if(id==='exp'&&isMobileNav()){setView('expenses');return}
  if(currentView!=='route')setView('route');
  const el=document.getElementById(typeof id==='number'?'panel-'+id:'panel-exp');
  if(!el)return;
  scrollLock=true;
  clearTimeout(scrollLockTimer);
  const top=el.getBoundingClientRect().top+window.scrollY-stickyOffset();
  window.scrollTo({top,behavior:'smooth'});
  const ti=typeof id==='number'?id:DAYS.length;
  currentActive=-1;
  setActiveTab(ti);
  if(typeof id==='number'){
    if(fsMapId!==null&&fsMapId!==id)closeMapFullscreen();
    setTimeout(()=>{initMap(id);if(mapInst[id])mapInst[id].invalidateSize();},400);
  }
  scrollLockTimer=setTimeout(()=>{scrollLock=false;},900);
}

function updateActiveFromScroll(){
  if(scrollLock||fsMapId!==null||currentView!=='route')return;
  const offset=stickyOffset()+8;
  const panels=[...document.querySelectorAll('.panel')].filter(p=>{
    if(p.id==='panel-places')return false;
    if(p.id==='panel-exp'&&(isMobileNav()||currentView!=='route'))return false;
    return p.offsetParent!==null;
  });
  let active=0;
  for(let i=0;i<panels.length;i++){
    if(panels[i].getBoundingClientRect().top<=offset)active=i;
  }
  if(active===currentActive)return;
  setActiveTab(active);
  if(active<DAYS.length){
    if(!mapInst[active])initMap(active);
    else mapInst[active].invalidateSize();
  }
}

let scrollRaf=null;
window.addEventListener('scroll',()=>{
  if(scrollRaf)return;
  scrollRaf=requestAnimationFrame(()=>{
    scrollRaf=null;
    updateActiveFromScroll();
  });
},{passive:true});

const mapObserver=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting)return;
    const m=e.target.id.match(/^panel-(\d+)$/);
    if(m)initMap(+m[1]);
  });
},{rootMargin:'240px 0px'});
document.querySelectorAll('.panel[id^="panel-"]:not(#panel-places)').forEach(p=>mapObserver.observe(p));

setTimeout(()=>initMap(0),120);
</script>
</body>
</html>
