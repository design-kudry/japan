<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --torii:#C1440E;--torii-light:#FFF0EB;
  --indigo:#2C3E7A;--indigo-light:#EEF1FA;
  --ink:#1A1A2E;--ink-soft:#5A5A7A;
  --mist:#F5F4F0;--white:#FFFFFF;
  --border:#E5E2DA;--gold:#B5882A;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'Inter',sans-serif;background:var(--mist);color:var(--ink);font-size:15px;line-height:1.55}
h1,h2,h3,.jp{font-family:'Noto Serif JP',serif}

.site-header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100}
.site-header h1{font-size:18px;color:var(--torii);letter-spacing:.03em}
.site-header p{font-size:12px;color:var(--ink-soft);margin-top:2px}

.tabs-wrap{background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;scrollbar-width:none;position:sticky;top:57px;z-index:99}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:inline-flex;padding:0 8px}
.tab{display:inline-block;padding:10px 13px;font-size:11.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;user-select:none}
.tab.active{color:var(--torii);border-bottom-color:var(--torii)}
.tab:hover:not(.active){color:var(--ink)}

.panel{display:none;max-width:640px;margin:0 auto;padding:14px}
.panel.active{display:block}

.map-wrap{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);background:#e8e4dd;margin-bottom:14px;position:relative}
.day-map{height:230px}
.gmap-btn{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:var(--white);color:var(--indigo);font-size:12px;font-weight:600;padding:7px 16px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.18);text-decoration:none;white-space:nowrap;z-index:500;display:flex;align-items:center;gap:5px}
.gmap-btn:hover{background:var(--indigo);color:#fff}

.day-header{margin-bottom:14px;padding-top:2px}
.day-date{font-size:11px;font-weight:600;color:var(--torii);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.day-title{font-size:20px;font-weight:700;color:var(--ink)}
.day-jp{font-size:12px;color:var(--ink-soft);margin-top:2px}

.transit{background:var(--indigo-light);border-left:3px solid var(--indigo);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.transit-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.transit-body{flex:1}
.transit-route{font-size:13px;font-weight:600;color:var(--indigo)}
.transit-detail{font-size:12px;color:var(--ink-soft);margin-top:2px}
.transit-cost{font-size:12px;font-weight:600;color:var(--gold);margin-top:3px}

.place{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.place-photo{width:100%;height:175px;object-fit:cover;display:block;background:var(--mist)}
.place-photo-err{width:100%;height:175px;background:linear-gradient(135deg,#f0ede6,#e5e2da);display:none;align-items:center;justify-content:center;font-size:32px}
.place-body{padding:12px 14px}
.place-num{display:inline-block;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:5px;letter-spacing:.04em}
.place-name{font-size:14px;font-weight:700;color:var(--ink)}
.place-jp{font-size:11px;color:var(--ink-soft);margin-top:1px}
.place-desc{font-size:12.5px;color:var(--ink-soft);margin-top:7px;line-height:1.5}
.place-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.tag-price{background:var(--torii-light);color:var(--torii)}
.tag-free{background:#e8f4ec;color:#2a7a4a}
.tag-hours{background:var(--mist);color:var(--ink-soft)}

.budget-block{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-top:14px}
.budget-block h3{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.budget-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.budget-row:last-child{border-bottom:none;padding-top:8px}
.budget-row:last-child .budget-label{font-weight:700;color:var(--ink)}
.budget-row:last-child .budget-val{font-weight:700;color:var(--torii)}
.budget-label{font-size:13px;color:var(--ink-soft)}
.budget-val{font-size:13px;font-weight:600;color:var(--ink)}

.day-note{background:var(--mist);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;font-style:italic}

.exp-section{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.exp-section h3{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px}
.exp-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.exp-row:last-child{border-bottom:none}
.exp-label{color:var(--ink-soft)}
.exp-val{font-weight:600;color:var(--ink);text-align:right}
.exp-total{background:linear-gradient(135deg,var(--torii),#a03508);color:#fff;border-radius:var(--radius);padding:18px;margin-top:8px;text-align:center}
.exp-total .t-label{font-size:12px;opacity:.85;margin-bottom:5px}
.exp-total .t-jpy{font-size:24px;font-weight:700}
.exp-total .t-rub{font-size:13px;opacity:.85;margin-top:3px}

.leaflet-popup-content-wrapper{border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.leaflet-popup-content{margin:10px 12px;min-width:150px}
.popup-img{width:100%;height:88px;object-fit:cover;border-radius:6px;margin-bottom:6px;display:block}
.popup-name{font-size:13px;font-weight:700;color:var(--ink)}
.popup-sub{font-size:11px;color:var(--ink-soft);margin-top:2px}
.photo-marker{width:42px;height:42px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);overflow:hidden;position:relative;cursor:pointer;background:#ddd}
.photo-marker img{width:100%;height:100%;object-fit:cover;display:block}
.photo-marker .badge{position:absolute;bottom:-1px;right:-1px;width:16px;height:16px;border-radius:50%;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff}
</style>
</head>

function buildGmapsUrl(pts){
  if(!pts||!pts.length)return'#';
  if(pts.length===1)return`https://www.google.com/maps/search/?api=1&query=${pts[0].lat},${pts[0].lng}`;
  const o=`${pts[0].lat},${pts[0].lng}`,de=`${pts[pts.length-1].lat},${pts[pts.length-1].lng}`;
  const wp=pts.slice(1,-1).map(p=>`${p.lat},${p.lng}`).join('|');
  let url=`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${de}&travelmode=walking`;
  if(wp)url+=`&waypoints=${encodeURIComponent(wp)}`;
  return url;
}

function initMap(i){
  if(mapInst[i])return;
  const d=DAYS[i];
  const pts=d.places.filter(p=>p.lat);
  const el=document.getElementById('map-'+i);
  if(!el||!pts.length)return;
  const map=L.map(el,{zoomControl:true,scrollWheelZoom:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
  if(pts.length>1)L.polyline(pts.map(p=>[p.lat,p.lng]),{color:d.color,weight:3,opacity:.65,dashArray:'6,5'}).addTo(map);
  pts.forEach((pl,idx)=>{
    const n=idx+1;
    const html=`<div class="photo-marker" title="${pl.name}">
      <img src="${pl.img}" alt="" loading="lazy"
        onerror="this.style.display='none';this.parentNode.style.background='${d.color}'">
      <div class="badge" style="background:${d.color}">${n}</div>
    </div>`;
    const icon=L.divIcon({className:'',html,iconSize:[42,42],iconAnchor:[21,21],popupAnchor:[0,-24]});
    L.marker([pl.lat,pl.lng],{icon}).addTo(map).bindPopup(`
      <img class="popup-img" src="${pl.img}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="popup-name">${n}. ${pl.name}</div>
      <div class="popup-sub">${pl.jp||''} · ${pl.price}</div>
    `);
  });
  if(pts.length===1)map.setView([pts[0].lat,pts[0].lng],14);
  else map.fitBounds(L.latLngBounds(pts.map(p=>[p.lat,p.lng])).pad(0.25));
  mapInst[i]=map;
  const btn=document.getElementById('gmap-'+i);
  if(btn)btn.href=buildGmapsUrl(pts);
}

function showDay(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const pid=typeof id==='number'?'panel-'+id:'panel-exp';
  document.getElementById(pid).classList.add('active');
  const tabs=[...document.querySelectorAll('.tab')];
  const ti=typeof id==='number'?id:DAYS.length;
  if(tabs[ti])tabs[ti].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(typeof id==='number')setTimeout(()=>initMap(id),80);
}

setTimeout(()=>initMap(0),120);
</script>
